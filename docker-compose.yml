version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: digicloudify-app
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=pgsql
      - DB_HOST=pgsql
      - DB_PORT=5432
      - DB_DATABASE=digicloudify
      - DB_USERNAME=sail
      - DB_PASSWORD=password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
      - HORIZON_CONNECTION=redis
    volumes:
      - .:/var/www
    depends_on:
      - pgsql
      - redis

  horizon:
    build:
      context: .
      dockerfile: Dockerfile
    command: php artisan horizon
    environment:
      - APP_ENV=local
      - DB_CONNECTION=pgsql
      - DB_HOST=pgsql
      - DB_PORT=5432
      - DB_DATABASE=digicloudify
      - DB_USERNAME=sail
      - DB_PASSWORD=password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
      - HORIZON_CONNECTION=redis
    depends_on:
      - app
      - redis

  pgsql:
    image: 'postgres:16'
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: 'digicloudify'
      POSTGRES_USER: 'sail'
      POSTGRES_PASSWORD: 'password'
    volumes:
      - 'sail-pgsql:/var/lib/postgresql/data'

  redis:
    image: 'redis:alpine'
    ports:
      - "6379:6379"
    volumes:
      - 'sail-redis:/data'

  meilisearch:
    image: 'getmeili/meilisearch:latest'
    ports:
      - "7700:7700"
    environment:
      MEILI_NO_ANALYTICS: 'true'
    volumes:
      - 'sail-meilisearch:/meili_data'

volumes:
  sail-pgsql:
    driver: local
  sail-redis:
    driver: local
  sail-meilisearch:
    driver: local
